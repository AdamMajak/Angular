<h2>Clan Members</h2>

<ul>
  @for (let member of members(); track member.id)
    <li>
      {{ member.name }} (Level {{ member.level }})
      <button (click)="removeMember(member)">Remove</button>
    </li>
  @end
</ul>

<h3>Add New Member</h3>
<input #newMember placeholder="Player Name">
<button (click)="addMember(newMember.value); newMember.value=''">Add</button>

<h2>Players</h2>
<ul>
  @for (let p of players(); track p.id)
    @if (p.clanId === undefined)
      <li>{{ p.name }} (Level {{ p.level }}) - Unassigned</li>
    @end
  @end
</ul>
